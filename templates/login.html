{% extends 'base.html' %}

{% block title %}Iniciar Sesión — Estacionamiento Público{% endblock %}

{% block content %}
<div class="login-page">
  <div class="login-container">
    <div class="login-card">
      <div class="login-logo">
        <div class="login-logo-icon" style="background: transparent; box-shadow: none;">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="filter: drop-shadow(0 0 5px rgba(0, 212, 170, 0.5)); color: var(--teal);">
            <path d="M3 10L12 4L21 10" />
            <path d="M6 16C6 17.1046 6.89543 18 8 18C9.10457 18 10 17.1046 10 16H14C14 17.1046 14.8954 18 16 18C17.1046 18 18 17.1046 18 16V13C18 11.8954 17.1046 11 16 11H8C6.89543 11 6 11.8954 6 13V16Z" />
            <path d="M7 11L8.5 8H15.5L17 11" />
          </svg>
        </div>
        <h1>ParkSystem</h1>
        <p>Estacionamiento Público — Sistema de Gestión</p>
      </div>

      <form method="POST" action="{{ url_for('login') }}" id="login-form">
        <div class="form-group">
          <label class="form-label" for="username">Usuario</label>
          <div class="form-input-wrapper">
            <input type="text" id="username" name="username" class="form-input"
                   placeholder="Ingresa tu usuario" required autocomplete="username">
            <span class="input-icon">👤</span>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Contraseña</label>
          <div class="form-input-wrapper">
            <input type="password" id="password" name="password" class="form-input"
                   placeholder="Ingresa tu contraseña" required autocomplete="current-password">
            <span class="input-icon">🔒</span>
          </div>
        </div>

        <div class="form-group">
          <div class="form-checkbox-group">
            <input type="checkbox" id="remember" class="form-checkbox">
            <label for="remember" class="form-checkbox-label">Recordar sesión</label>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-block" id="login-btn">
          Iniciar Sesión
          <span>→</span>
        </button>
      </form>

      <div class="mt-3 text-center">
        <p class="text-muted" style="font-size: 0.8rem;">
          Sistema administrado por <strong style="color: var(--text-secondary);">ParkSystem v1.0</strong>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
